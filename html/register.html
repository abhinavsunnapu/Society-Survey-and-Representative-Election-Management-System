<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="../css/registration.css">
</head>
<body>
 <header  ><img src="../images/image.png" alt="Logo" width="120" />
        Survey and Representative Election Management System
    </header>
    <main>
        <form>
            <h2>Registration Form</h2>
            <label for ="FullName">Full Name:</label>
            <input type="text" id="FullName" name="FullName" required><br><br>
            <label for="Flat/House Number">Flat/House Number:</label>
            <input type="textarea" id="Flat/House Number" name="Flat/House Number" required><br><br>
            <label for="Email">Email:</label>
            <input type="email" id="Email" name="Email" required><br><br>
            <label for="Password">Password:</label> 
            <input type="password" id="Password" name="Password" required><br><br>
            <label for="ConfirmPassword">Confirm Password:</label>
            <input type="password" id="ConfirmPassword" name="ConfirmPassword" required><br><br>
            <label for="Resident Type:Owner/Tenant">Resident Type:</label>
            <select id="Resident Type:Owner/Tenant" name="Resident Type:Owner/Tenant" required>
                <option value="">Select Resident Type</option>
                <option value="Owner">Owner</option>
                <option value="Tenant">Tenant</option>
            </select><br><br>
            <button type="submit">Register</button>
        </form>
    </main>
</body>
</html>
