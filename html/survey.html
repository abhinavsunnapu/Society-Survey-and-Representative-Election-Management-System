<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/survey.css">
</head>
<body>
    <header><img src="../images/image.png" alt="Logo" width="120" />
        Survey and Representative Election Management System    
    </header>
    <main>
        <section class="survey-section">
            <h2>Survey topics:</h2>
            <form>
                <label for="cleanliness">Cleanliness satisfaction</label>
                <section class="radio-group">
                <input type="radio" id="cleanliness" name="cleanliness" value="1" >1
                <input type="radio" id="cleanliness" name="cleanliness" value="2">2
                <input type="radio" id="cleanliness" name="cleanliness" value="3">3
                <input type="radio" id="cleanliness" name="cleanliness" value="4">4
                <input type="radio" id="cleanliness" name="cleanliness" value="5">5
                </section>
                
                 <label for="security">Security service feedback</label>
               

                <input type="text" id="security" name="security" placeholder="Enter your feedback here">
               
                <label for="parking">Parking issues </label>
                <input type="text" id="parking" name="parking" placeholder="Enter your feedback here">
             
                <label for="water">Water supply feedback </label>
                <input type="text" id="water" name="water" placeholder="Enter your feedback here">
             
                <label for="maintenance">Maintenance quality</label>
                <section class="radio-group">
                <input type="radio" id="maintenance" name="maintenance" value="1">1
                <input type="radio" id="maintenance" name="maintenance" value="2">2
                <input type="radio" id="maintenance" name="maintenance" value="3">3
                <input type="radio" id="maintenance" name="maintenance" value="4">4
                <input type="radio" id="maintenance" name="maintenance" value="5">5
                </section>
             
                <label for="suggestion">Other suggestions:</label>
                <input type="text" id="suggestion" name="suggestion" placeholder="Enter your suggestion here">
              
                <button type="submit">Submit</button>   
            </form>
        </section>
    </main>
</body>
</html>
