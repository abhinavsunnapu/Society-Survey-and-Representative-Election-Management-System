<body>
    <header><img src="../images/image.png" alt="Logo" width="120" />
        Survey and Representative Election Management System

            <ul>
                <li><a href="forget-password.html">Forgot Password?</a></li>

            <button type="submit">Login</button>
        </form>
    </main>
         

</body>
</html>
